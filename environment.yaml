name: noise_qml
channels:
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # JAX + CUDA 12 (GPU)
      - jax[cuda12]==0.9.0.1
      - jaxlib==0.9.0.1
      - optax==0.2.7

      # PennyLane + GPU plugin
      - pennylane==0.44.0
      - pennylane-lightning==0.44.0
      - pennylane-lightning-gpu==0.44.0   # requires CUDA 12 + cuStateVec
      - custatevec-cu12==1.12.0

      # Numerics
      - numpy==2.4.2
      - scipy==1.17.1

      # Plotting
      - matplotlib==3.10.8
